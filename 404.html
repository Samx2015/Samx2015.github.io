<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #182023;
        background: #fbfaf7;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(34rem, calc(100% - 2rem));
        padding: 2rem;
        border: 1px solid #dfe8e5;
        border-radius: 8px;
        background: #ffffff;
      }

      a {
        color: #0b7f7c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p id="message">Checking whether this page has moved.</p>
      <p><a href="/">Go to xintechllc.com</a></p>
    </main>
    <script>
      const aliases = {
        displayhelper: "DisplayHelper",
        displayhelperpro: "DisplayHelperPro",
        machelper: "MacHelper",
        machelperpro: "MacHelperPro"
      };
      const match = window.location.pathname.match(/^\/([^/]+)(\/.*)?$/);
      const canonical = match ? aliases[match[1].toLowerCase()] : null;

      if (canonical) {
        const suffix = (match[2] || "/").replace(/\/Privacy\.html$/i, "/privacy.html");
        const target = `/${canonical}${suffix}${window.location.search}${window.location.hash}`;
        const message = document.getElementById("message");
        const link = document.createElement("a");
        link.href = target;
        link.textContent = target;
        message.textContent = "Redirecting to ";
        message.append(link, ".");

        if (target !== `${window.location.pathname}${window.location.search}${window.location.hash}`) {
          window.location.replace(target);
        }
      }
    </script>
  </body>
</html>
