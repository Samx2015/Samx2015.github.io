  <rect x="406" y="860" width="272" height="60" rx="30" fill="#3a3a3a"/>
  <text x="542" y="899" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="750" fill="#c7c7c7">CONTINUE</text>
