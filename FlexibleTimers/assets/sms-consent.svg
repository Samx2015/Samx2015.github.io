  <text x="390" y="41" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#f0f0f0">Set Up SMS</text>

  <text x="60" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#e8e8e8">PHONE NUMBER</text>
  <rect x="60" y="190" width="297" height="54" rx="11" fill="#333"/>
  <text x="80" y="226" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="650" fill="#efefef">+1 United States</text>
  <path d="M326 209l7 7 7-7M326 225l7-7 7 7" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="386" y="186" width="343" height="62" rx="19" fill="none" stroke="#1b77a8" stroke-width="6"/>
  <text x="405" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#e8e8e8">5550100</text>

  <rect x="60" y="290" width="32" height="32" rx="9" fill="#2f2f2f" stroke="#3a3a3a"/>
  <path d="M68 306l8 9 18-21" fill="none" stroke="#48a8ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="104" y="315" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="650" fill="#eeeeee">I agree to receive SMS verification codes and</text>
  <text x="104" y="348" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="650" fill="#eeeeee">Flexible Timers reminder messages I schedule</text>
  <text x="104" y="381" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="650" fill="#eeeeee">for myself at this phone number.</text>

  <text x="104" y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="650" fill="#a9a9a9">Standard message and data rates may apply. Reply STOP</text>
  <text x="104" y="484" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="650" fill="#a9a9a9">to opt out and HELP for help. Message frequency varies.</text>
  <text x="104" y="513" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="650" fill="#a9a9a9">Flexible Timers will not send marketing texts. Consent is</text>
  <text x="104" y="542" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="650" fill="#a9a9a9">not a condition of purchase.</text>

  <text x="104" y="632" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="650" fill="#a9a9a9">SMS reminders can be sent only to this verified</text>
  <text x="104" y="662" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="650" fill="#a9a9a9">account phone number. Third-party SMS is not allowed.</text>

  <text x="104" y="742" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#43a5ff">SMS Terms</text>
  <text x="244" y="742" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650" fill="#a9a9a9">and</text>
  <text x="304" y="742" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#43a5ff">Privacy Policy</text>

  <rect x="102" y="860" width="272" height="60" rx="30" fill="#333"/>
