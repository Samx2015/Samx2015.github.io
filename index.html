<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xintech LLC</title>
    <meta
      name="description"
      content="Xintech LLC builds practical Mac utilities including DisplayHelper, DisplayHelper Pro, MacHelper, and MacHelper Pro."
    >
    <style>
      :root {
        color-scheme: light;
        --ink: #182023;
        --muted: #667276;
        --paper: #fbfbf8;
        --line: #dce6e2;
        --teal: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        width: min(100%, 880px);
        margin: 0 auto;
        padding: 72px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 7vw, 5rem);
        line-height: 1;
        font-weight: 420;
        letter-spacing: 0;
      }

      p {
        max-width: 640px;
        margin: 0 0 36px;
        color: var(--muted);
        font-size: 1.25rem;
      }

      nav {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      a {
        display: block;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        background: #fff;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        border-color: rgba(15, 118, 110, 0.4);
        color: var(--teal);
      }

      strong,
      span {
        display: block;
      }

      strong {
        margin-bottom: 4px;
        font-weight: 520;
      }

      span {
        color: var(--muted);
      }

      @media (max-width: 680px) {
        main {
          padding-top: 44px;
        }

        nav {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Xintech LLC</h1>
      <p>Practical Mac utilities, built to stay quiet and useful.</p>
      <nav aria-label="Product websites">
        <a href="/DisplayHelper/">
          <strong>DisplayHelper</strong>
          <span>Mac App Store display helper.</span>
        </a>
        <a href="/DisplayHelperPro/">
          <strong>DisplayHelper Pro</strong>
          <span>Direct-distribution display helper.</span>
        </a>
        <a href="/MacHelper/">
          <strong>MacHelper</strong>
          <span>Mac App Store utility suite.</span>
        </a>
        <a href="/MacHelperPro/">
          <strong>MacHelper Pro</strong>
          <span>Direct-distribution utility suite.</span>
        </a>
      </nav>
    </main>
  </body>
</html>
